# Llama 3 / Llama 3.1 instruct template.
# Reference:
# https://www.llama.com/docs/model-cards-and-prompt-formats/llama3_1/#json-based-tool-calling
#
# Strings throughout; encoded at tokenize time. Special tokens
# (<|begin_of_text|>, <|start_header_id|>, <|end_header_id|>, <|eot_id|>,
# <|eom_id|>) resolve to single added-token IDs.

bos: "<|begin_of_text|>"
strip_whitespace: true
strip_reasoning_from_prior_turns: false
inject_empty_reasoning_for_last_turn: false
generation_prompt_suffix: "<|start_header_id|>assistant<|end_header_id|>\n\n"
# <|eot_id|> is the turn terminator.
stop_token_ids: [128009]

roles:
  system:
    envelope_start: "<|start_header_id|>system<|end_header_id|>\n\n"
    envelope_end:   "<|eot_id|>"

  user:
    envelope_start: "<|start_header_id|>user<|end_header_id|>\n\n"
    envelope_end:   "<|eot_id|>"

  assistant:
    envelope_start: "<|start_header_id|>assistant<|end_header_id|>\n\n"
    envelope_end:   "<|eot_id|>"

  tool:
    envelope_start: "<|start_header_id|>ipython<|end_header_id|>\n\n"
    envelope_end:   "<|eot_id|>"
