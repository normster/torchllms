# OLMo2 instruct template.
#
# Uses `<|system|>`, `<|user|>`, `<|assistant|>`, `<|tool|>` as plain text
# (NOT as single-token specials in the OLMo tokenizer); encoding them as
# strings produces the correct multi-token sequences.

bos: "<|endoftext|>"
strip_whitespace: true
strip_reasoning_from_prior_turns: false
inject_empty_reasoning_for_last_turn: false
generation_prompt_suffix: "<|assistant|>\n"
# <|endoftext|> terminates the assistant turn.
stop_token_ids: [100257]

roles:
  system:
    envelope_start: "<|system|>\n"
    envelope_end:   "<|endoftext|>"

  user:
    envelope_start: "<|user|>\n"
    envelope_end:   "<|endoftext|>"

  assistant:
    envelope_start: "<|assistant|>\n"
    envelope_end:   "<|endoftext|>"

  tool:
    envelope_start: "<|tool|>\n"
    envelope_end:   "<|endoftext|>"
